name: CI - Docker Compose Build & Push

on:
  push:
    branches: [ "compose" ]   # ✅ Trigger only on compose branch

jobs:
  build:
    runs-on: ubuntu-latest
    env:   # ✅ Use GitHub Secrets for environment variables
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: ${{ secrets.NODE_ENV }}
      PORT: ${{ secrets.PORT }}

    steps:
      # ✅ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Run root tests if present
      - name: Run root tests if present
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run -s test --if-present
          fi

      # ✅ Run frontend tests if present
      - name: Run frontend tests if present
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run -s test --if-present
          fi

      # ✅ Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ Build & Push Docker images
      - name: Build & Push Docker images
        run: |
          IMAGE_TAG=${{ github.sha }}

          # Build images with docker-compose (using env from secrets)
          docker compose -f docker-compose.yml build

          # Tag & Push Frontend
          docker tag interview-frontend ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-frontend:latest
          docker tag interview-frontend ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-frontend:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-frontend:$IMAGE_TAG

          # Tag & Push Backend
          docker tag interview-backend ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-backend:latest
          docker tag interview-backend ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-backend:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/interview-app-backend:$IMAGE_TAG
