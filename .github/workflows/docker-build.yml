name: CI - Docker Build & Push

on:
  push:
    branches: [ "compose" ]   # Trigger only on compose branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push backend
      - name: Build and push Backend
        run: |
          docker build -t manoharreddy123/interview-app-backend:latest -t manoharreddy123/interview-app-backend:${{ github.sha }} -f backend.Dockerfile .
          docker push manoharreddy123/interview-app-backend:latest
          docker push manoharreddy123/interview-app-backend:${{ github.sha }}

      # Build and push frontend
      - name: Build and push Frontend
        run: |
          docker build -t manoharreddy123/interview-app-frontend:latest -t manoharreddy123/interview-app-frontend:${{ github.sha }} ./frontend
          docker push manoharreddy123/interview-app-frontend:latest
          docker push manoharreddy123/interview-app-frontend:${{ github.sha }}
