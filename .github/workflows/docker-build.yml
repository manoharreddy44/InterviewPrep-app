name: CI - Docker Compose Build & Push

on:
  push:
    branches: [ "compose" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Run tests (root)
      - name: Run root tests if present
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run -s test --if-present
          fi

      # Run frontend tests
      - name: Run frontend tests if present
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run -s test --if-present
          fi

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push
      - name: Build & Push Docker images
        run: |
          IMAGE_TAG=${{ github.sha }}

          # Build with docker-compose
          docker compose -f docker-compose.yml build

          # Push both (latest + commit SHA)
          docker push manoharreddy123/interview-app-frontend:latest || true
          docker tag manoharreddy123/interview-app-frontend manoharreddy123/interview-app-frontend:$IMAGE_TAG
          docker push manoharreddy123/interview-app-frontend:$IMAGE_TAG

          docker push manoharreddy123/interview-app-backend:latest || true
          docker tag manoharreddy123/interview-app-backend manoharreddy123/interview-app-backend:$IMAGE_TAG
          docker push manoharreddy123/interview-app-backend:$IMAGE_TAG
