name: CI - Docker Compose Build & Push

on:
  push:
    branches: [ "compose" ]   # Runs only when pushing to compose branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Docker Compose Build with secrets
      - name: Docker Compose Build
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          PORT: ${{ secrets.PORT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: docker compose -f docker-compose.yml build

      # 5️⃣ Run backend (root) tests if present
      - name: Run backend tests if present
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          PORT: ${{ secrets.PORT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run -s test --if-present
          fi

      # 6️⃣ Run frontend tests if present
      - name: Run frontend tests if present
        working-directory: frontend
        env:
          NODE_ENV: ${{ secrets.NODE_ENV }}
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run -s test --if-present
          fi

      # 7️⃣ Push latest images defined in docker-compose.yml
      - name: Docker Compose Push (latest)
        run: docker compose -f docker-compose.yml push

      # 8️⃣ Tag images with Git SHA and push
      - name: Tag & Push versioned images (SHA)
        run: |
          GIT_SHA=${{ github.sha }}
          BACKEND=manoharreddy123/interview-app-backend
          FRONTEND=manoharreddy123/interview-app-frontend
          docker tag $BACKEND:latest $BACKEND:${GIT_SHA}
          docker tag $FRONTEND:latest $FRONTEND:${GIT_SHA}
          docker push $BACKEND:${GIT_SHA}
          docker push $FRONTEND:${GIT_SHA}
