services:
  mongo:
    image: mongo:6
    container_name: interview-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: manoharreddy123/interview-app-backend:latest
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: interview-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGO_DB_URI=${MONGO_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
    depends_on:
      - mongo

  frontend:
    image: manoharreddy123/interview-app-frontend:latest
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    container_name: interview-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data: